<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CineTrack — Cadastro</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">🎬 CineTrack</div>
        <h2 class="auth-title">Criar conta</h2>

        <div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div>

        <form action="#" th:action="@{/registro}" method="post" th:object="${usuario}">
            Nome:   <input type="text"     th:field="*{nome}"  required><br>
            E-mail: <input type="email"    th:field="*{email}" required><br>
            Senha:  <input type="password" th:field="*{senha}" required>
            <input type="submit" value="Cadastrar" class="btn-submit">
        </form>

        <p class="auth-footer">Já tem conta? <a th:href="@{/login}">Entrar</a></p>
    </div>
</div>

</body>
</html>
