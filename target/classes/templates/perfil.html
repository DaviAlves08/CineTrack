<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CineTrack — Perfil</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🎬 CineTrack</div>
    <div class="navbar-links">
        <a th:href="@{/filmes}"  class="nav-link">🎬 Filmes</a>
        <a th:href="@{/series}"  class="nav-link">📺 Séries</a>
        <a th:href="@{/lista}"   class="nav-link">📋 Minha Lista</a>
        <a th:href="@{/perfil}"  class="nav-link active">👤 Perfil</a>
        <a th:href="@{/logout}"  class="btn-logout">Sair</a>
    </div>
</nav>

<main class="container">

    <!-- Cabeçalho do perfil -->
    <div class="perfil-header">
        <div class="perfil-avatar" th:text="${#strings.substring(usuario.nome,0,1).toUpperCase()}"></div>
        <div>
            <h2 th:text="${usuario.nome}"></h2>
            <p class="perfil-email" th:text="${usuario.email}"></p>
            <span class="status-logado">🟢 Logado</span>
        </div>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}"  class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}"     class="alert alert-error"   th:text="${erro}"></div>

    <!-- Stats -->
    <h3 class="section-title" style="margin-top:2rem">📊 Estatísticas</h3>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-num" th:text="${total}"></div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-card stat-done">
            <div class="stat-num" th:text="${assistidos}"></div>
            <div class="stat-label">Assistidos</div>
        </div>
        <div class="stat-card stat-watching">
            <div class="stat-num" th:text="${assistindo}"></div>
            <div class="stat-label">Assistindo</div>
        </div>
        <div class="stat-card stat-want">
            <div class="stat-num" th:text="${queroAssistir}"></div>
            <div class="stat-label">Quero assistir</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" th:text="${totalFilmes}"></div>
            <div class="stat-label">Filmes</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" th:text="${totalSeries}"></div>
            <div class="stat-label">Séries</div>
        </div>
    </div>

    <!-- Formulários lado a lado -->
    <div class="perfil-forms-grid">

        <!-- Dados pessoais -->
        <div class="perfil-form-card">
            <h3 class="perfil-form-title">👤 Dados pessoais</h3>
            <form action="#" th:action="@{/perfil/dados}" method="post">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-input"
                       th:value="${usuario.nome}" required>

                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-input"
                       th:value="${usuario.email}" required>

                <input type="submit" value="Salvar dados" class="btn-submit btn-full">
            </form>
        </div>

        <!-- Alterar senha -->
        <div class="perfil-form-card">
            <h3 class="perfil-form-title">🔒 Alterar senha</h3>
            <form action="#" th:action="@{/perfil/senha}" method="post">
                <label class="form-label">Senha atual</label>
                <input type="password" name="senhaAtual" class="form-input"
                       placeholder="••••••••" required>

                <label class="form-label">Nova senha</label>
                <input type="password" name="novaSenha" class="form-input"
                       placeholder="••••••••" required>

                <label class="form-label">Confirmar nova senha</label>
                <input type="password" name="confirmarSenha" class="form-input"
                       placeholder="••••••••" required>

                <input type="submit" value="Alterar senha" class="btn-submit btn-full">
            </form>
        </div>

    </div>

</main>

</body>
</html>
