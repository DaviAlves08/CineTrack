<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CineTrack — Perfil</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🎬 CineTrack</div>
    <div class="navbar-links">
        <a th:href="@{/filmes}"  class="nav-link">🎬 Filmes</a>
        <a th:href="@{/series}"  class="nav-link">📺 Séries</a>
        <a th:href="@{/lista}"   class="nav-link">📋 Minha Lista</a>
        <a th:href="@{/perfil}"  class="nav-link active">👤 Perfil</a>
        <a th:href="@{/logout}"  class="btn-logout">Sair</a>
    </div>
</nav>

<main class="container">
    <div class="perfil-card">

        <!-- Avatar -->
        <div class="perfil-avatar" th:text="${#strings.substring(usuario.nome, 0, 1).toUpperCase()}"></div>

        <!-- Info -->
        <div class="perfil-info">
            <h2 th:text="${usuario.nome}"></h2>
            <p class="perfil-email">📧 <span th:text="${usuario.email}"></span></p>
            <span class="status-logado">🟢 Logado</span>
        </div>
    </div>

    <!-- Stats -->
    <h3 class="section-title" style="margin-top:2rem">📊 Estatísticas da Lista</h3>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-num" th:text="${total}"></div>
            <div class="stat-label">Total na lista</div>
        </div>
        <div class="stat-card stat-done">
            <div class="stat-num" th:text="${assistidos}"></div>
            <div class="stat-label">Assistidos</div>
        </div>
        <div class="stat-card stat-watching">
            <div class="stat-num" th:text="${assistindo}"></div>
            <div class="stat-label">Assistindo</div>
        </div>
        <div class="stat-card stat-want">
            <div class="stat-num" th:text="${queroAssistir}"></div>
            <div class="stat-label">Quero assistir</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" th:text="${totalFilmes}"></div>
            <div class="stat-label">Filmes</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" th:text="${totalSeries}"></div>
            <div class="stat-label">Séries</div>
        </div>
    </div>
</main>

</body>
</html>
